<svg xmlns="http://www.w3.org/2000/svg" width="900" height="780" viewBox="0 0 900 780">
<defs>
  <style>
    text { font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif; }
  </style>
  <linearGradient id="hdrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1a2a4a"/>
    <stop offset="100%" style="stop-color:#2d4a7a"/>
  </linearGradient>
  <clipPath id="cardClip">
    <rect width="900" height="780" rx="12"/>
  </clipPath>
</defs>
<g clip-path="url(#cardClip)">
  <rect width="900" height="780" fill="white"/>

  <!-- Header -->
  <rect width="900" height="110" fill="url(#hdrGrad)"/>
  <text x="36" y="30" font-size="10" font-weight="600" fill="#a8c0e8" letter-spacing="2">EVIDENCE 01 · 협상 이력 요약</text>
  <text x="36" y="58" font-size="21" font-weight="700" fill="white">로젠택배 파손 보상 기준 협상 및 프로세스 개선</text>
  <text x="36" y="84" font-size="13" fill="#a8c0e8">택배 표준약관 근거 압박 → 물품 회수 조건 철폐 · 사진 증빙 대체 확정</text>

  <!-- Result box (prominent, near top) -->
  <rect x="20" y="124" width="860" height="76" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="20" y="124" width="5" height="76" rx="2" fill="#16a34a"/>
  <text x="42" y="148" font-size="11" font-weight="700" fill="#16a34a" letter-spacing="1">협상 결과</text>
  <text x="42" y="168" font-size="15" font-weight="700" fill="#14532d">물품 회수 조건 완전 철폐 · 파손 사진 증빙만으로 즉시 사고 접수 가능</text>
  <text x="42" y="187" font-size="12" fill="#166534">고객이 박스 폐기·주말 경과 후에도 보상 청구 불가했던 구조 → 담당자 협의 주도로 해소</text>

  <!-- Timeline label -->
  <text x="36" y="230" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="1.5">협상 타임라인</text>

  <!-- Step 1 -->
  <circle cx="58" cy="262" r="18" fill="#fee2e2"/>
  <text x="58" y="267" font-size="14" font-weight="800" fill="#dc2626" text-anchor="middle">1</text>
  <line x1="58" y1="280" x2="58" y2="368" stroke="#e2e8f0" stroke-width="2"/>
  <text x="90" y="255" font-size="10" font-weight="600" fill="#94a3b8">2025.09.26</text>
  <rect x="158" y="244" width="61" height="18" rx="9" fill="#fee2e2"/>
  <text x="188" y="256" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">로젠 대응</text>
  <text x="90" y="276" font-size="15" font-weight="700" fill="#1e293b">로젠 측 강경 대응 — 회수 없이는 보상 불가</text>
  <text x="90" y="296" font-size="13" fill="#475569">파손 접수 원칙으로 ① 물품 회수 → ② 입고 확인 → ③ 사고 접수 3단계 고수.</text>
  <text x="90" y="314" font-size="13" fill="#475569">고객이 박스 폐기·주말 경과 후에도 회수 없으면 보상 불가 입장 통보.</text>

  <!-- Step 2 -->
  <circle cx="58" cy="384" r="18" fill="#dbeafe"/>
  <text x="58" y="389" font-size="14" font-weight="800" fill="#2563eb" text-anchor="middle">2</text>
  <line x1="58" y1="402" x2="58" y2="490" stroke="#e2e8f0" stroke-width="2"/>
  <text x="90" y="377" font-size="10" font-weight="600" fill="#94a3b8">2025.11.03</text>
  <rect x="158" y="366" width="79" height="18" rx="9" fill="#dbeafe"/>
  <text x="197" y="378" font-size="10" font-weight="700" fill="#2563eb" text-anchor="middle">초록마을 대응</text>
  <text x="90" y="398" font-size="15" font-weight="700" fill="#1e293b">택배 표준약관 제9조·제18조 근거로 의무 이행 공식 요구</text>
  <text x="90" y="418" font-size="13" fill="#475569">파손 인지 시 지체 없이 송화인 통보 의무(제9조4항)·사고 발생 시 조치 의무(제18조) 명시.</text>
  <text x="90" y="436" font-size="13" fill="#475569">특정 영업소가 아닌 시스템적 문제로 규정, 로젠의 계약 의무 이행 공식 요청.</text>

  <!-- Step 3 -->
  <circle cx="58" cy="506" r="18" fill="#dcfce7"/>
  <text x="58" y="511" font-size="14" font-weight="800" fill="#16a34a" text-anchor="middle">3</text>
  <line x1="58" y1="524" x2="58" y2="598" stroke="#e2e8f0" stroke-width="2"/>
  <text x="90" y="499" font-size="10" font-weight="600" fill="#94a3b8">2025.11.03 (당일)</text>
  <rect x="158" y="488" width="61" height="18" rx="9" fill="#fee2e2"/>
  <text x="188" y="500" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">로젠 대응</text>
  <text x="90" y="520" font-size="15" font-weight="700" fill="#1e293b">로젠, 약관 내용 인정 및 내부 검토 착수</text>
  <text x="90" y="540" font-size="13" fill="#475569">약관 근거 압박에 더 이상 반박하지 못하고 자사 표준약관 명시 사항 공식 인정.</text>
  <text x="90" y="558" font-size="13" fill="#475569">기존 강경 입장 사실상 철회, 내부 소통 후 회신 예정 통보.</text>

  <!-- Step 4 -->
  <circle cx="58" cy="614" r="18" fill="#ccfbf1"/>
  <text x="58" y="619" font-size="14" font-weight="800" fill="#0d9488" text-anchor="middle">4</text>
  <text x="90" y="607" font-size="10" font-weight="600" fill="#94a3b8">2025.11.04 (다음날)</text>
  <rect x="158" y="596" width="79" height="18" rx="9" fill="#dcfce7"/>
  <text x="197" y="608" font-size="10" font-weight="700" fill="#16a34a" text-anchor="middle">프로세스 확정</text>
  <text x="90" y="630" font-size="15" font-weight="700" fill="#1e293b">로젠 주도 간소화 프로세스 제안 및 확정</text>
  <text x="90" y="650" font-size="13" fill="#475569">로젠이 직접 개선안 마련하여 제안 — 물품 회수 요건 완전 철폐,</text>
  <text x="90" y="668" font-size="13" fill="#475569">파손 사진 증빙으로 대체하는 방식으로 확정.</text>

  <!-- Footer -->
  <rect x="0" y="735" width="900" height="45" fill="#f8fafc"/>
  <line x1="0" y1="735" x2="900" y2="735" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="28" cy="757" r="3" fill="#94a3b8"/>
  <text x="36" y="762" font-size="10" fill="#94a3b8">출처: 로젠택배_초록마을 CS 운영방 카카오톡 대화 (2025.09–11)</text>
  <circle cx="480" cy="757" r="3" fill="#94a3b8"/>
  <text x="488" y="762" font-size="10" fill="#94a3b8">담당자: 오희은 (초록마을 CS운영)</text>
</g>
</svg>
