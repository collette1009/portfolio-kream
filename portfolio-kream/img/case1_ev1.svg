<svg xmlns="http://www.w3.org/2000/svg" width="460" height="615" viewBox="0 0 460 615">
<defs>
  <style>
    text { font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif; }
  </style>
  <linearGradient id="hdrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1a2a4a"/>
    <stop offset="100%" style="stop-color:#2d4a7a"/>
  </linearGradient>
  <clipPath id="cardClip">
    <rect width="460" height="615" rx="12"/>
  </clipPath>
</defs>
<g clip-path="url(#cardClip)">
  <rect width="460" height="615" fill="white"/>

  <!-- Header -->
  <rect width="460" height="88" fill="url(#hdrGrad)"/>
  <text x="16" y="24" font-size="10" font-weight="600" fill="#a8c0e8" letter-spacing="2">EVIDENCE 01 · 협상 이력 요약</text>
  <text x="16" y="50" font-size="17" font-weight="700" fill="white">로젠택배 파손 보상 기준 협상 및 프로세스 개선</text>
  <text x="16" y="72" font-size="11" fill="#a8c0e8">택배 표준약관 근거 압박 → 물품 회수 조건 철폐 · 사진 증빙 대체 확정</text>
  <!-- Result box -->
  <rect x="10" y="97" width="440" height="72" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="10" y="97" width="4" height="72" rx="2" fill="#16a34a"/>
  <text x="24" y="118" font-size="10" font-weight="700" fill="#16a34a" letter-spacing="1">협상 결과</text>
  <text x="24" y="138" font-size="14" font-weight="700" fill="#14532d">물품 회수 조건 완전 철폐 · 파손 사진 증빙만으로 즉시 접수 가능</text>
  <text x="24" y="157" font-size="11" fill="#166534">고객이 박스 폐기·주말 경과 후에도 보상 불가했던 구조 → 담당자 협의로 해소</text>

  <!-- Timeline label -->
  <text x="16" y="188" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="1.5">협상 타임라인</text>
  <!-- Step 1 -->
  <circle cx="30" cy="213" r="13" fill="#fee2e2"/>
  <text x="30" y="218" font-size="13" font-weight="800" fill="#dc2626" text-anchor="middle">1</text>
  <line x1="30" y1="226" x2="30" y2="300" stroke="#e2e8f0" stroke-width="2"/>
  <text x="52" y="205" font-size="10" font-weight="600" fill="#94a3b8">2025.09.26</text>
  <rect x="122" y="194" width="55" height="16" rx="8" fill="#fee2e2"/>
  <text x="149" y="205" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">로젠 대응</text>
  <text x="52" y="228" font-size="14" font-weight="700" fill="#1e293b">로젠 측 강경 대응 — 회수 없이 보상 불가</text>
  <text x="52" y="245" font-size="12" fill="#475569">물품 회수→입고 확인→사고 접수 3단계 원칙 고수.</text>
  <text x="52" y="260" font-size="12" fill="#475569">박스 폐기·주말 경과 후에도 회수 없으면 보상 불가 통보.</text>
  <!-- Step 2 -->
  <circle cx="30" cy="313" r="13" fill="#dbeafe"/>
  <text x="30" y="318" font-size="13" font-weight="800" fill="#2563eb" text-anchor="middle">2</text>
  <line x1="30" y1="326" x2="30" y2="400" stroke="#e2e8f0" stroke-width="2"/>
  <text x="52" y="305" font-size="10" font-weight="600" fill="#94a3b8">2025.11.03</text>
  <rect x="122" y="294" width="72" height="16" rx="8" fill="#dbeafe"/>
  <text x="158" y="305" font-size="10" font-weight="700" fill="#2563eb" text-anchor="middle">초록마을 대응</text>
  <text x="52" y="328" font-size="14" font-weight="700" fill="#1e293b">택배 표준약관 근거로 의무 이행 공식 요구</text>
  <text x="52" y="345" font-size="12" fill="#475569">파손 인지 즉시 통보 의무(제9조4항)·사고 조치 의무(제18조) 명시.</text>
  <text x="52" y="360" font-size="12" fill="#475569">시스템적 과실로 규정, 로젠의 계약 의무 이행 공식 요청.</text>
  <!-- Step 3 -->
  <circle cx="30" cy="413" r="13" fill="#dcfce7"/>
  <text x="30" y="418" font-size="13" font-weight="800" fill="#16a34a" text-anchor="middle">3</text>
  <line x1="30" y1="426" x2="30" y2="500" stroke="#e2e8f0" stroke-width="2"/>
  <text x="52" y="405" font-size="10" font-weight="600" fill="#94a3b8">2025.11.03 (당일)</text>
  <rect x="168" y="394" width="55" height="16" rx="8" fill="#fee2e2"/>
  <text x="195" y="405" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">로젠 대응</text>
  <text x="52" y="428" font-size="14" font-weight="700" fill="#1e293b">로젠, 약관 내용 인정 및 내부 검토 착수</text>
  <text x="52" y="445" font-size="12" fill="#475569">약관 근거 압박에 반박 못하고 표준약관 사항 공식 인정.</text>
  <text x="52" y="460" font-size="12" fill="#475569">기존 강경 입장 사실상 철회, 내부 검토 후 회신 예정.</text>
  <!-- Step 4 -->
  <circle cx="30" cy="513" r="13" fill="#ccfbf1"/>
  <text x="30" y="518" font-size="13" font-weight="800" fill="#0d9488" text-anchor="middle">4</text>
  <text x="52" y="505" font-size="10" font-weight="600" fill="#94a3b8">2025.11.04 (다음날)</text>
  <rect x="172" y="494" width="72" height="16" rx="8" fill="#dcfce7"/>
  <text x="208" y="505" font-size="10" font-weight="700" fill="#16a34a" text-anchor="middle">프로세스 확정</text>
  <text x="52" y="528" font-size="14" font-weight="700" fill="#1e293b">로젠 주도 간소화 프로세스 제안 및 확정</text>
  <text x="52" y="545" font-size="12" fill="#475569">로젠이 직접 개선안 마련 — 물품 회수 요건 완전 철폐,</text>
  <text x="52" y="560" font-size="12" fill="#475569">파손 사진 증빙만으로 즉시 사고 접수 가능하도록 확정.</text>

  <!-- Footer -->
  <rect x="0" y="580" width="460" height="35" fill="#f8fafc"/>
  <line x1="0" y1="580" x2="460" y2="580" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="16" cy="597" r="2.5" fill="#94a3b8"/>
  <text x="23" y="601" font-size="10" fill="#94a3b8">출체: 로젠택배_초록마을 CS 운영방 카카오톡 (2025.09–11) · 담당: 오희은</text>
</g>
</svg>
